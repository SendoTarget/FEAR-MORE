# F.E.A.R. RtxLab compatibility seed for the pinned Remix 1.5.2 runtime.
# The default Automatic graphics preset resolves to High on an RTX 4070 and
# immediately overwrites the indirect integrator with NRC. Custom is the only
# stock preset that preserves the explicit ReSTIR GI mode below.
rtx.graphicsPreset = 4
rtx.integrateIndirectMode = 1

# Remix 1.5.2 defaults DLSS Frame Generation on, but F.E.A.R.'s live probe
# produced NGX InvalidParameter on creation and every evaluation. Keep the
# mutable in-game option available while defaulting this known-broken path off.
rtx.dlfg.enable = False

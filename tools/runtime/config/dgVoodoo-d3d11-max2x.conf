; FearMore-owned opt-in dgVoodoo2 2.87.3 supersampling profile.
; It preserves the conservative Native profile except for dgVoodoo's max_2x
; internal resolution multiplier. Lanczos-3 owns the final reduction while
; presentation, texture filtering, MSAA, and VSync stay app-driven.

Version = 0x287

[General]
OutputAPI = d3d11_fl11_0
Adapters = all
FullScreenOutput = default
FullScreenMode = true
ScalingMode = unspecified
KeepWindowAspectRatio = true

[GeneralExt]
Resampling = lanczos-3
PresentationModel = auto
ColorSpace = appdriven
FPSLimit = 0

[DirectX]
DisableAndPassThru = false
VideoCard = internal3D
VRAM = 256
Filtering = appdriven
Mipmapping = appdriven
Resolution = max_2x
Antialiasing = appdriven
AppControlledScreenMode = true
DisableAltEnterToToggleScreenMode = true
ForceVerticalSync = false
dgVoodooWatermark = false
FastVideoMemoryAccess = false

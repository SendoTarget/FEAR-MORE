; FearMore-owned conservative dgVoodoo2 2.87.3 profile.
; It selects D3D11 output plus Lanczos-3 whenever dgVoodoo must resample the
; final image. Resolution, antialiasing, filtering, presentation, and VSync
; otherwise remain app-driven.

Version = 0x287

[General]
OutputAPI = d3d11_fl11_0
Adapters = all
FullScreenOutput = default
FullScreenMode = true
ScalingMode = unspecified
KeepWindowAspectRatio = true

[GeneralExt]
Resampling = lanczos-3
PresentationModel = auto
ColorSpace = appdriven
FPSLimit = 0

[DirectX]
DisableAndPassThru = false
VideoCard = internal3D
VRAM = 256
Filtering = appdriven
Mipmapping = appdriven
Resolution = unforced
Antialiasing = appdriven
AppControlledScreenMode = true
DisableAltEnterToToggleScreenMode = true
ForceVerticalSync = false
dgVoodooWatermark = false
FastVideoMemoryAccess = false

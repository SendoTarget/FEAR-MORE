; FearMore conservative compatibility profile for rebuilt game modules.
; This profile is intentionally not the stock-retail EchoPatch profile.

[Compatibility]
; Preserve EXE-owned hooks but do not scan or patch rebuilt GameClient.dll,
; GameServer.dll, or ClientFX at retail addresses/signatures.
PatchGameModules = 0

[Fixes]
; Local EXE/engine-owned features retained.
DisableRedundantHIDInit = 1
OptimizeSaveSpeed = 1
FixNvidiaShadowCorruption = 1
FixAspectRatioBlur = 1
FastVRAMDetection = 1
FixSoundWrapperLoading = 1
FixScriptedAnimationCrash = 1

; Disabled because these have a game-module or ClientFX half.
HighFPSFixes = 0
DisableXPWidescreenFiltering = 0
FixKeyboardInputLanguage = 0
WeaponFixes = 0

; Avoid modifying a user-owned executable from this conservative profile.
CheckLAAPatch = 0

[Graphics]
; Clearly EXE/engine-owned options retained.
; HighFPSFixes is disabled because it spans game modules, so keep the
; experimental engine-only profile at a conservative 60 FPS until runtime QA.
MaxFPS = 60.0
DynamicVsync = 1
NoLODBias = 1
ReducedMipMapBias = 1

; Client-module-dependent features disabled. SSAAScale=1.0 means native render
; resolution; this profile makes no SSAA support claim.
HighResolutionReflections = 0
SSAAScale = 1.0
EnablePersistentWorldState = 0

[Display]
; Module-dependent display features disabled.
CustomFOV = 0.0
HUDScaling = 0
HUDCustomScalingFactor = 1.0
SmallTextCustomScalingFactor = 1.0
AutoResolution = 0
DisableLetterbox = 0

; EXE-owned window handling remains available.
ForceWindowed = 0
FixWindowStyle = 1

[Controller]
; SDL controller support spans EXE, Client, Server, and ClientFX hooks.
MouseAimMultiplier = 1.0
SDLGamepadSupport = 0
RumbleEnabled = 0
GyroEnabled = 0
GyroAimingMode = 0
GyroSensitivity = 1.0
GyroSmoothing = 0.016
GyroCalibrationPersistence = 0
TouchpadEnabled = 0
HideMouseCursor = 0

[SkipIntro]
; Video interception is EXE/engine-owned.
; SkipSplashScreen also has a Client-module patch, so it stays disabled.
SkipSplashScreen = 0
SkipAllIntro = 0
SkipSierraIntro = 1
SkipMonolithIntro = 0
SkipWBGamesIntro = 1
SkipNvidiaIntro = 1
SkipTimegateIntro = 1
SkipDellIntro = 1

[Console]
; The console also has Client/ClientFX integration, so keep it off.
ConsoleEnabled = 0
DebugLevel = 0
HighResolutionScaling = 0
LogOutputToFile = 0

[Extra]
; EXE/engine-owned options. Redirection is left off to preserve save location.
RedirectSaveFolder = 0
DisablePunkBuster = 1
EnableCrashHandler = 1

; Game-module-dependent gameplay options disabled.
InfiniteFlashlight = 0
EnableCustomMaxWeaponCapacity = 0
MaxWeaponCapacity = 3
DisableHipFireAccuracyPenalty = 0

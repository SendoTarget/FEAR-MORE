[Compatibility]
; RTX Remix owns a persistent D3D9/Vulkan presentation chain. F.E.A.R. v1.08's
; legacy focus handler otherwise tears the renderer down on deactivation and
; reinitializes it on activation, which can deadlock or lose the Remix device.
; This exact-byte-verified exception is for the RtxLab derivative only.
PreserveRtxRendererOnFocusChange = 1

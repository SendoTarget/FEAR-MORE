
; Experimental RTX camera-reassertion candidate. This combined override makes
; all three required behaviors explicit and is used instead of the two narrower
; camera/focus overrides, avoiding duplicate profile keys.
[Diagnostics]
CameraDiagnostics = 1
RtxCameraReassertion = 1

[Compatibility]
PreserveRtxRendererOnFocusChange = 1
